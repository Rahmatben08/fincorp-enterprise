server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: fincorp-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev-local}

  # Default/Production PostgreSQL Configuration (used when not in dev-local profile)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fincorp_enterprise_db}
    username: ${SPRING_DATASOURCE_USERNAME:fincorp_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:SecretPassword123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}/realms/fincorp-realm
          jwk-set-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}/realms/fincorp-realm/protocol/openid-connect/certs

integration:
  payroll-service:
    url: ${PAYROLL_SERVICE_URL:http://localhost:8082}

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO

---
# 🟢 Zero-Setup In-Memory Fallback Profile (Active by Default)
spring:
  config:
    activate:
      on-profile: dev-local
  
  datasource:
    url: jdbc:h2:mem:fincorp_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # Automatically creates schema structure on startup
    show-sql: true
