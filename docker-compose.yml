version: '3.8'

services:
  fincorp-db:
    image: mariadb:10.11
    container_name: fincorp-mariadb
    environment:
      MYSQL_DATABASE: fincorp_enterprise_db
      MYSQL_USER: fincorp_admin
      MYSQL_PASSWORD: SecretPassword123
      MYSQL_ROOT_PASSWORD: RootPassword123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
